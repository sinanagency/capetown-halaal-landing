<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Facebook Post</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #F8F5EE;
    color: #1A1A1A;
    font-family: 'Inter', -apple-system, Arial, sans-serif;
    overflow: hidden;
  }
  .canvas {
    width: 1200px;
    height: 630px;
    display: grid;
    grid-template-columns: 420px 1fr;
    align-items: stretch;
  }
  .left {
    background: #1A1A1A;
    padding: 56px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  .logo-frame {
    width: 280px;
    height: 280px;
    background: #F8F5EE;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-frame img { max-width: 78%; max-height: 78%; object-fit: contain; }
  .left .url {
    font-size: 18px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    font-weight: 700;
    color: #cd2653;
  }
  .right {
    padding: 60px 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 18px;
  }
  .kicker {
    color: #cd2653;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .kicker .dot { width: 10px; height: 10px; border-radius: 50%; background: #cd2653; }
  .business {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 64px;
    line-height: 1.0;
    font-weight: 600;
    color: #1A1A1A;
    letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 22px;
    color: #5a5754;
    line-height: 1.4;
    font-weight: 400;
  }
  .find-row {
    margin-top: 12px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-top: 2px solid rgba(26, 26, 26, 0.12);
    padding-top: 22px;
  }
  .find-row .lbl {
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #8a8a8a;
    font-weight: 600;
  }
  .find-row .stall {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 56px;
    line-height: 1.0;
    font-weight: 700;
    color: #cd2653;
    letter-spacing: 0.02em;
  }
  .dates {
    font-size: 20px;
    color: #4a4a4a;
    font-weight: 500;
    line-height: 1.35;
  }
  .dates strong { color: #1A1A1A; font-weight: 600; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="left">
      <div class="logo-frame">{{logo_block}}</div>
      <div class="url">cthalaal.co.za</div>
    </div>
    <div class="right">
      <div class="kicker"><span class="dot"></span><span>Young at Heart Festival</span></div>
      <div class="business">{{business_name}}</div>
      <div class="tagline">{{tagline}}</div>
      <div class="find-row">
        <span class="lbl">Stall</span>
        <span class="stall">{{stall_code}}</span>
      </div>
      <div class="dates"><strong>11 to 13 December 2026</strong><br/>Youngsfield Military Base, Cape Town</div>
    </div>
  </div>
</body>
</html>
