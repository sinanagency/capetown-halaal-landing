<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>IG Story</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; }
  body {
    background: #F8F5EE;
    color: #1A1A1A;
    font-family: 'Inter', -apple-system, Arial, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .canvas {
    width: 1080px;
    height: 1920px;
    padding: 130px 90px 120px;
    display: flex;
    flex-direction: column;
    /* space-evenly distributes the slack across the three zones (mark, hero,
       find-us card) instead of dumping one large void in the middle. */
    justify-content: space-evenly;
    position: relative;
  }
  .top-mark {
    display: flex;
    align-items: center;
    gap: 24px;
    color: #cd2653;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .top-mark .dot { width: 16px; height: 16px; border-radius: 50%; background: #cd2653; }
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .logo-frame {
    width: 320px;
    height: 320px;
    border-radius: 36px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(26, 26, 26, 0.08);
    border: 2px solid rgba(205, 38, 83, 0.12);
  }
  .logo-frame img { max-width: 78%; max-height: 78%; object-fit: contain; }
  .business {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 88px;
    line-height: 1.05;
    font-weight: 600;
    color: #1A1A1A;
    margin-top: 56px;
    letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 32px;
    color: #5a5754;
    margin-top: 24px;
    line-height: 1.35;
    font-weight: 400;
  }
  .find-us {
    background: #1A1A1A;
    color: #F8F5EE;
    border-radius: 28px;
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .find-us .kicker {
    font-size: 24px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #cd2653;
    font-weight: 700;
  }
  .find-us .where {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 72px;
    line-height: 1.05;
    font-weight: 600;
  }
  .find-us .stall {
    display: inline-flex;
    align-items: baseline;
    gap: 18px;
    margin-top: 4px;
  }
  .find-us .stall .lbl {
    font-size: 22px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(248, 245, 238, 0.55);
    font-weight: 600;
  }
  .find-us .stall .code {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 92px;
    font-weight: 700;
    color: #F8F5EE;
    letter-spacing: 0.02em;
  }
  .find-us .meta {
    font-size: 28px;
    color: rgba(248, 245, 238, 0.85);
    line-height: 1.45;
  }
  .footer-mark {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
    font-size: 22px;
    color: #5a5754;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .footer-mark .url { color: #cd2653; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="top-mark">
      <span class="dot"></span>
      <span>Cape Town Halaal 2026</span>
    </div>
    <div class="logo-block">
      <div class="logo-frame">{{logo_block}}</div>
      <div class="business">{{business_name}}</div>
      <div class="tagline">{{tagline}}</div>
    </div>
    <div>
      <div class="find-us">
        <div class="kicker">Find us at</div>
        <div class="where">Young at Heart Festival</div>
        <div class="stall">
          <span class="lbl">Stall</span>
          <span class="code">{{stall_code}}</span>
        </div>
        <div class="meta">11 to 13 December 2026<br/>Youngsfield Military Base, Cape Town</div>
      </div>
      <div class="footer-mark">
        <span>#CapeTownHalaal</span>
        <span class="url">cthalaal.co.za</span>
      </div>
    </div>
  </div>
</body>
</html>
